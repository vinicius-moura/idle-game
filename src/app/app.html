<div id="game-container" class="main-container">
    <div class="column left-column">
        <app-stats-clicker></app-stats-clicker>

        <div class="prestige-container">
            <div class="prestige-info">
                Legendary Level: <span>{{ state().prestige.level }}</span> 
                (+<span>{{ (state().prestige.permanentBonus - 1) * 100 | number:'1.0-0' }}</span>% Bonus)
            </div>
            <button class="prestige-btn" [disabled]="true">Embrace Legendary Piracy</button>
        </div>
    </div>

    <div class="column right-column">
        <h2>The Grand Scheme (aka The Shop)</h2>
        <app-upgrade-shop></app-upgrade-shop>
    </div>
</div>
