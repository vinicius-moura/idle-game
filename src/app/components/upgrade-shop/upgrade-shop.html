<div class="upgrades-container">
    @for (upgrade of upgradesData; track upgrade.id) {
        @let upState = getUpgradeState(upgrade.id);
        
        <!-- Filtro: Omitir barcos já comprados -->
        @if (!(upgrade.type === 'ship' && upState.level > 0)) {
            <app-upgrade-item 
                [upgrade]="upgrade"
                [level]="upState.level"
                [cost]="upState.cost"
                [canAfford]="canAfford(upState.cost)"
                (buy)="buy($event)">
            </app-upgrade-item>
        }
    }
</div>
