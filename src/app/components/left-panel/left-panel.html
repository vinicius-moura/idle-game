<div class="left-panel-buttons">
  @if (hasCrewSlots) {
    <button class="left-panel-btn" (click)="crewOpen.set(true)">
      Crew
    </button>
  }
  <button class="left-panel-btn" (click)="prestigeOpen.set(true)">
    Prestige
  </button>
</div>

<app-crew [isOpen]="crewOpen()" (close)="crewOpen.set(false)"></app-crew>
<app-prestige [isOpen]="prestigeOpen()" (close)="prestigeOpen.set(false)"></app-prestige>
