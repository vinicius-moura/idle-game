<div class="left-panel-tabs">
  @if (hasCrewSlots) {
    <button
      class="left-tab"
      [class.active]="activeTab() === 'crew'"
      [class.solo]="!hasCrewSlots"
      (click)="setTab('crew')">
      ⚓ Crew
    </button>
  }
  <button
    class="left-tab"
    [class.active]="activeTab() === 'prestige'"
    [class.solo]="!hasCrewSlots"
    (click)="setTab('prestige')">
    ✨ Prestige
  </button>
</div>

<div class="left-panel-content">
  @if (activeTab() === 'crew' && hasCrewSlots) {
    <app-crew></app-crew>
  }
  @if (activeTab() === 'prestige') {
    <app-prestige></app-prestige>
  }
</div>
